name: Auto Enroll Arbox

on:
  schedule:
    - cron: '55 12 * * 4'  # Every Thursday at 12:55 UTC = 15:55 Israel time (5 min before enrollment)
  workflow_dispatch:       # Manual trigger option
    inputs:
      skip_wait:
        description: 'Skip waiting (for testing)'
        required: false
        default: 'false'

jobs:
  enroll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run enrollment
        env:
          ARBOX_USER_EMAIL: ${{ secrets.ARBOX_USER_EMAIL }}
          ARBOX_USER_PASSWORD: ${{ secrets.ARBOX_USER_PASSWORD }}
          SKIP_WAIT: ${{ github.event.inputs.skip_wait || 'false' }}
        run: node app.js
