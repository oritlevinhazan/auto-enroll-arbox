name: Auto Enroll Arbox

on:
  workflow_dispatch:       # Triggered by cron-job.org every Thursday at 13:00 UTC (16:00 Israel time)
    inputs:
      skip_wait:
        description: 'Skip waiting (for testing)'
        required: false
        default: 'false'

jobs:
  enroll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run enrollment
        env:
          ARBOX_USER_EMAIL: ${{ secrets.ARBOX_USER_EMAIL }}
          ARBOX_USER_PASSWORD: ${{ secrets.ARBOX_USER_PASSWORD }}
          ALERTZY_ACCOUNT_KEY: ${{ secrets.ALERTZY_ACCOUNT_KEY }}
          SKIP_WAIT: ${{ github.event.inputs.skip_wait || 'false' }}
        run: node app.js
